    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",

    <style>
      :root {
        --kslb-blue-dark: #0D57A6;
        --kslb-blue-main: #1565C0;
        --kslb-blue-light: #A7D3F5;
        --kslb-coral: #FF8F87;
        --kslb-white: #FFFFFF;
        --wa-green: #25D366;
        --wa-bg: #E5DDD5;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* Safe area insets for notched phones (iPhone X+) */
      .safe-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .safe-top {
        padding-top: env(safe-area-inset-top, 0px);
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      /* #M16 — Comprehensive print styles for SummaryPage */
      @media print {
        .no-print {
          display: none !important;
        }
        body {
          background-color: white !important;
          padding: 0;
          margin: 0;
          font-size: 11pt;
          line-height: 1.4;
          -webkit-print-color-adjust: exact;
          color-adjust: exact;
          print-color-adjust: exact;
        }
        main {
          margin: 0 !important;
          padding: 0 !important;
          max-width: 100% !important;
          box-shadow: none !important;
        }
        /* Remove shadows, rounded corners, and excessive spacing */
        #print-area * {
          box-shadow: none !important;
        }
        #print-area section {
          break-inside: avoid;
          page-break-inside: avoid;
          margin-bottom: 12pt;
        }
        #print-area .p-4 {
          padding: 8pt !important;
        }
        /* Keep score cards together */
        #print-area .grid > div {
          break-inside: avoid;
          page-break-inside: avoid;
        }
        /* Force backgrounds on score indicators */
        #print-area .bg-green-100,
        #print-area .bg-yellow-100,
        #print-area .bg-red-100,
        #print-area .bg-blue-100,
        #print-area .bg-orange-100 {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        /* Page header spacing */
        #print-area header {
          margin-bottom: 16pt;
        }
        /* Section headers: force border color */
        #print-area h3 {
          border-color: #1565C0 !important;
        }
        /* Links → plain text */
        a { text-decoration: none !important; color: inherit !important; }
        /* Hide sticky nav bars */
        .sticky { position: static !important; }
        /* Page margins via @page */
        @page {
          margin: 1.5cm 1cm;
          size: A4;
        }
      }

      /* WhatsApp Chat styles */
      .wa-chat-bg {
        background-color: var(--wa-bg);
        background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        background-blend-mode: overlay;
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
